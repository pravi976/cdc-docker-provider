name: Provider CDC Pipeline (Brokerless Shared Contracts)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  repository_dispatch:
    types: [ consumer-contract-updated ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  JAVA_VERSION: "17"
  CDC_FRAMEWORK_VERSION: ${{ vars.CDC_FRAMEWORK_VERSION }}
  CDC_PACKAGES_OWNER: ${{ vars.CDC_PACKAGES_OWNER }}
  CDC_PACKAGES_REPO: ${{ vars.CDC_PACKAGES_REPO }}
  PROVIDER_PACTICIPANT: supply-inventory-provider
  CONSUMER_PACTICIPANT: supply-orders-consumer
  DEPLOY_ENV: test
  SHARED_CONTRACT_REPO: ${{ vars.SHARED_CONTRACT_REPO || 'pravi976/cdc-docker-consumer' }}
  SHARED_CONTRACT_BRANCH: ${{ vars.SHARED_CONTRACT_BRANCH || 'contracts' }}

jobs:
  verify-provider:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Provider Repo
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Resolve Contract Coordinates
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "CONSUMER_SHA=${{ github.event.client_payload.source_sha }}" >> "${GITHUB_ENV}"
            echo "SHARED_REPO=${{ github.event.client_payload.shared_contract_repo || env.SHARED_CONTRACT_REPO }}" >> "${GITHUB_ENV}"
            echo "SHARED_BRANCH=${{ github.event.client_payload.shared_contract_branch || env.SHARED_CONTRACT_BRANCH }}" >> "${GITHUB_ENV}"
            echo "CONSUMER_NAME=${{ github.event.client_payload.consumer_pacticipant || env.CONSUMER_PACTICIPANT }}" >> "${GITHUB_ENV}"
            echo "PROVIDER_NAME=${{ github.event.client_payload.provider_pacticipant || env.PROVIDER_PACTICIPANT }}" >> "${GITHUB_ENV}"
            echo "DEPLOY_TARGET=${{ github.event.client_payload.deploy_env || env.DEPLOY_ENV }}" >> "${GITHUB_ENV}"
          else
            echo "SHARED_REPO=${SHARED_CONTRACT_REPO}" >> "${GITHUB_ENV}"
            echo "SHARED_BRANCH=${SHARED_CONTRACT_BRANCH}" >> "${GITHUB_ENV}"
            echo "CONSUMER_NAME=${CONSUMER_PACTICIPANT}" >> "${GITHUB_ENV}"
            echo "PROVIDER_NAME=${PROVIDER_PACTICIPANT}" >> "${GITHUB_ENV}"
            echo "DEPLOY_TARGET=${DEPLOY_ENV}" >> "${GITHUB_ENV}"
          fi

      - name: Checkout Shared Contracts Repo/Branch
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SHARED_REPO }}
          ref: ${{ env.SHARED_BRANCH }}
          path: contracts-repo
          token: ${{ secrets.GH_REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve Consumer Contract Version (Fallback For Push/PR)
        run: |
          if [ -n "${CONSUMER_SHA:-}" ]; then
            exit 0
          fi
          LATEST_FILE="contracts-repo/contracts/latest/${CONSUMER_NAME}/latest.sha"
          if [ ! -f "${LATEST_FILE}" ]; then
            echo "No latest contract marker found at ${LATEST_FILE}"
            exit 1
          fi
          echo "CONSUMER_SHA=$(cat "${LATEST_FILE}")" >> "${GITHUB_ENV}"

      - name: Verify Provider Against Shared Pact Files
        id: verify
        continue-on-error: true
        run: |
          PACT_FOLDER_PATH="${GITHUB_WORKSPACE}/contracts-repo/contracts/pacts/${CONSUMER_NAME}/${CONSUMER_SHA}"
          if [ ! -d "${PACT_FOLDER_PATH}" ]; then
            echo "PACT folder not found: ${PACT_FOLDER_PATH}"
            exit 1
          fi
          ./gradlew --no-daemon clean test \
            --tests "com.fedex.cdc.demo.provider.InventoryProviderLocalPactVerificationTest" \
            --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          PACT_FOLDER: ${{ github.workspace }}/contracts-repo/contracts/pacts/${{ env.CONSUMER_NAME }}/${{ env.CONSUMER_SHA }}

      - name: Publish Provider Verification Status To Shared Branch
        if: always()
        run: |
          cd contracts-repo
          STATUS_DIR="contracts/verification/${CONSUMER_NAME}/${CONSUMER_SHA}"
          STATUS_FILE="${STATUS_DIR}/${PROVIDER_NAME}-${DEPLOY_TARGET}.json"
          mkdir -p "${STATUS_DIR}"
          RESULT="SUCCESS"
          if [ "${{ steps.verify.outcome }}" != "success" ]; then
            RESULT="FAILED"
          fi
          cat > "${STATUS_FILE}" <<EOF
          {
            "consumer": "${CONSUMER_NAME}",
            "consumerVersion": "${CONSUMER_SHA}",
            "provider": "${PROVIDER_NAME}",
            "providerVersion": "${GITHUB_SHA}",
            "environment": "${DEPLOY_TARGET}",
            "result": "${RESULT}",
            "verifiedAt": "$(date -u +%FT%TZ)",
            "sourceRepository": "${GITHUB_REPOSITORY}",
            "sourceRunId": "${GITHUB_RUN_ID}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${STATUS_FILE}"
          if git diff --cached --quiet; then
            echo "No verification status changes."
            exit 0
          fi
          git commit -m "Verification ${RESULT}: ${CONSUMER_NAME}@${CONSUMER_SHA} by ${PROVIDER_NAME}@${GITHUB_SHA}"
          git push origin "${SHARED_BRANCH}"
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Fail Job When Verification Failed
        if: steps.verify.outcome != 'success'
        run: |
          echo "Provider verification failed for consumer contract ${CONSUMER_NAME}@${CONSUMER_SHA}"
          exit 1

  dockerize-and-deploy:
    runs-on: ubuntu-latest
    needs: verify-provider
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Build Application Jar
        run: ./gradlew --no-daemon clean bootJar -x test --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and Push Provider Image
        run: |
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub credentials not set. Skipping image build/push."
            exit 0
          fi
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker buildx create --use --name cdc-provider-builder || true
          docker buildx build \
            --push \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-provider:${GITHUB_SHA}" \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-provider:latest" \
            .
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
