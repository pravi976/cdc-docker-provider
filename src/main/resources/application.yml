server:
  port: 8082

spring:
  application:
    name: supply-inventory-provider
  datasource:
    url: jdbc:h2:mem:supplyinventory;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
